<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Algorithms — Factorial</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.1/dist/cdn.min.js"></script>
    <style>
        body { background-color: #f8f9fa; }
        .result-value { font-size: 1rem; font-weight: 500; word-break: break-all; max-height: 18rem; overflow-y: auto; }
        [x-cloak] { display: none !important; }
    </style>
</head>
<body>
<div class="container py-5" style="max-width: 780px;" x-data="factorialApp()">

    <nav class="mb-3">
        <a href="/" class="text-decoration-none">&larr; Back to algorithms</a>
    </nav>

    <header class="mb-4">
        <h1 class="mb-1">Factorial</h1>
        <p class="text-muted mb-0">
            <code>POST /api/algorithms/numbers/factorial</code> — computes <code>n!</code> for large numbers
            without using <code>BigInteger</code>.
        </p>
    </header>

    <div class="card shadow-sm mb-4">
        <div class="card-body">

            <div class="mb-3">
                <label for="n" class="form-label fw-semibold">Number n</label>
                <input id="n" type="text" inputmode="numeric" class="form-control font-monospace"
                       x-model="nInput"
                       placeholder="e.g. 100">
                <div class="form-text">
                    Non-negative integer in range <code>0</code> to <code>5000</code>. The result is
                    <code>n!</code> = product of all integers from <code>1</code> to <code>n</code>
                    (with <code>0! = 1</code> by convention).
                </div>
            </div>

            <div class="d-flex flex-wrap gap-2">
                <button class="btn btn-primary"
                        x-on:click="calculate()"
                        x-bind:disabled="loading">
                    <span x-show="!loading">Calculate</span>
                    <span x-show="loading" x-cloak style="display: none;">
                        <span class="spinner-border spinner-border-sm me-1" role="status" aria-hidden="true"></span>
                        Calculating…
                    </span>
                </button>
                <button class="btn btn-outline-secondary" x-on:click="loadExample()" type="button">
                    Load example
                </button>
                <button class="btn btn-outline-secondary" x-on:click="clearAll()" type="button">
                    Clear
                </button>
            </div>

        </div>
    </div>

    <template x-if="error">
        <div class="alert alert-danger" role="alert">
            <strong>Error:</strong> <span x-text="error"></span>
        </div>
    </template>

    <template x-if="result !== null">
        <div class="card shadow-sm border-success">
            <div class="card-header bg-success-subtle d-flex justify-content-between align-items-center">
                <span class="fw-semibold">Result</span>
                <span class="text-muted small">
                    <span x-text="result.length"></span> digits
                </span>
            </div>
            <div class="card-body">
                <div class="result-value text-success font-monospace" x-text="result"></div>
            </div>
        </div>
    </template>

</div>

<script>
    function factorialApp() {
        return {
            nInput: '',
            result: null,
            error: null,
            loading: false,

            loadExample() {
                this.nInput = '100';
                this.result = null;
                this.error = null;
            },

            clearAll() {
                this.nInput = '';
                this.result = null;
                this.error = null;
            },

            parseN(input) {
                const trimmed = input.trim();
                if (trimmed === '') {
                    throw new Error('n: value is empty');
                }
                const n = Number(trimmed);
                if (!Number.isInteger(n)) {
                    throw new Error(`n: "${trimmed}" is not a valid integer`);
                }
                return n;
            },

            async calculate() {
                this.error = null;
                this.result = null;

                let n;
                try {
                    n = this.parseN(this.nInput);
                } catch (e) {
                    this.error = e.message;
                    return;
                }

                this.loading = true;
                try {
                    const response = await fetch('/api/algorithms/numbers/factorial', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ n })
                    });

                    const data = await response.json();
                    if (!response.ok) {
                        this.error = data.error || `Request failed with HTTP ${response.status}`;
                    } else {
                        this.result = data.result;
                    }
                } catch (e) {
                    this.error = `Network error: ${e.message}`;
                } finally {
                    this.loading = false;
                }
            }
        };
    }
</script>
</body>
</html>
