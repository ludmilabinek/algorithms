<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Algorithms — Phone Validation</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.1/dist/cdn.min.js"></script>
    <style>
        body { background-color: #f8f9fa; }
        .result-value { font-size: 2rem; font-weight: 600; }
        [x-cloak] { display: none !important; }
    </style>
</head>
<body>
<div class="container py-5" style="max-width: 780px;" x-data="phoneValidateApp()">

    <nav class="mb-3">
        <a href="/" class="text-decoration-none">&larr; Back to algorithms</a>
    </nav>

    <header class="mb-4">
        <h1 class="mb-1">Phone Validation</h1>
        <p class="text-muted mb-0">
            <code>POST /api/algorithms/phones/validate</code> — validates a Polish 9-digit phone number.
        </p>
    </header>

    <div class="card shadow-sm mb-4">
        <div class="card-body">

            <div class="mb-3">
                <label for="phone" class="form-label fw-semibold">Phone number</label>
                <input id="phone" type="text" class="form-control font-monospace"
                       x-model="phoneInput"
                       placeholder="e.g. +48 500 600 700">
                <div class="form-text">
                    9 digits total, with optional <code>+48</code> country prefix. Allowed separators:
                    spaces, hyphens, and parentheses (around a 2-digit landline area code).
                </div>
            </div>

            <div class="d-flex flex-wrap gap-2">
                <button class="btn btn-primary"
                        x-on:click="validate()"
                        x-bind:disabled="loading">
                    <span x-show="!loading">Validate</span>
                    <span x-show="loading" x-cloak style="display: none;">
                        <span class="spinner-border spinner-border-sm me-1" role="status" aria-hidden="true"></span>
                        Validating…
                    </span>
                </button>
                <button class="btn btn-outline-secondary" x-on:click="loadExample()" type="button">
                    Load example
                </button>
                <button class="btn btn-outline-secondary" x-on:click="clearAll()" type="button">
                    Clear
                </button>
            </div>

        </div>
    </div>

    <template x-if="error">
        <div class="alert alert-danger" role="alert">
            <strong>Error:</strong> <span x-text="error"></span>
        </div>
    </template>

    <!-- Result: valid -->
    <template x-if="result === true">
        <div class="card shadow-sm border-success">
            <div class="card-header bg-success-subtle">
                <span class="fw-semibold">Valid</span>
            </div>
            <div class="card-body">
                <div class="result-value text-success">&#10003; Valid phone number</div>
                <div class="text-muted">After stripping separators, the input is exactly 9 digits (with an optional <code>+48</code> prefix).</div>
            </div>
        </div>
    </template>

    <!-- Result: invalid -->
    <template x-if="result === false">
        <div class="card shadow-sm border-danger">
            <div class="card-header bg-danger-subtle">
                <span class="fw-semibold">Invalid</span>
            </div>
            <div class="card-body">
                <div class="result-value text-danger">&#10007; Invalid phone number</div>
                <div class="text-muted">The input does not match a valid 9-digit Polish phone number after stripping allowed separators.</div>
            </div>
        </div>
    </template>

</div>

<script>
    function phoneValidateApp() {
        return {
            phoneInput: '',
            result: null,
            error: null,
            loading: false,

            loadExample() {
                this.phoneInput = '+48 500 600 700';
                this.result = null;
                this.error = null;
            },

            clearAll() {
                this.phoneInput = '';
                this.result = null;
                this.error = null;
            },

            async validate() {
                this.error = null;
                this.result = null;

                this.loading = true;
                try {
                    const response = await fetch('/api/algorithms/phones/validate', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ phone: this.phoneInput })
                    });

                    const data = await response.json();
                    if (!response.ok) {
                        this.error = data.error || `Request failed with HTTP ${response.status}`;
                    } else {
                        this.result = data.result;
                    }
                } catch (e) {
                    this.error = `Network error: ${e.message}`;
                } finally {
                    this.loading = false;
                }
            }
        };
    }
</script>
</body>
</html>
