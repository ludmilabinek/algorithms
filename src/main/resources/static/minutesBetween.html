<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Algorithms — Minutes Between Two Times</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.1/dist/cdn.min.js"></script>
    <style>
        body { background-color: #f8f9fa; }
        .result-value { font-size: 2rem; font-weight: 600; }
        [x-cloak] { display: none !important; }
    </style>
</head>
<body>
<div class="container py-5" style="max-width: 780px;" x-data="minutesBetweenApp()">

    <nav class="mb-3">
        <a href="/" class="text-decoration-none">&larr; Back to algorithms</a>
    </nav>

    <header class="mb-4">
        <h1 class="mb-1">Minutes Between Two Times</h1>
        <p class="text-muted mb-0">
            <code>POST /api/algorithms/times/minutes-between</code> — total minutes between two 12-hour clock times.
        </p>
    </header>

    <div class="card shadow-sm mb-4">
        <div class="card-body">

            <div class="mb-3">
                <label for="timeRange" class="form-label fw-semibold">Time range</label>
                <input id="timeRange" type="text" class="form-control font-monospace"
                       x-model="timeRangeInput"
                       placeholder="e.g. 9:00am-10:00am">
                <div class="form-text">
                    Format: <code>h:mm(am|pm)-h:mm(am|pm)</code>. If the end time is on or before the
                    start time, it is treated as the next day.
                </div>
            </div>

            <div class="d-flex flex-wrap gap-2">
                <button class="btn btn-primary"
                        x-on:click="calculate()"
                        x-bind:disabled="loading">
                    <span x-show="!loading">Calculate</span>
                    <span x-show="loading" x-cloak style="display: none;">
                        <span class="spinner-border spinner-border-sm me-1" role="status" aria-hidden="true"></span>
                        Calculating…
                    </span>
                </button>
                <button class="btn btn-outline-secondary" x-on:click="loadExample()" type="button">
                    Load example
                </button>
                <button class="btn btn-outline-secondary" x-on:click="clearAll()" type="button">
                    Clear
                </button>
            </div>

        </div>
    </div>

    <template x-if="error">
        <div class="alert alert-danger" role="alert">
            <strong>Error:</strong> <span x-text="error"></span>
        </div>
    </template>

    <template x-if="result !== null">
        <div class="card shadow-sm border-success">
            <div class="card-header bg-success-subtle">
                <span class="fw-semibold">Result</span>
            </div>
            <div class="card-body">
                <div class="result-value text-success">
                    <span x-text="result"></span>
                    <span class="fs-5 text-muted fw-normal">minutes</span>
                </div>
                <div class="text-muted small mt-1">
                    = <span x-text="humanReadable()"></span>
                </div>
            </div>
        </div>
    </template>

</div>

<script>
    function minutesBetweenApp() {
        return {
            timeRangeInput: '',
            result: null,
            error: null,
            loading: false,

            loadExample() {
                // Classic wrap-around example: 1:00pm to next-day 11:00am = 22 hours = 1320 min
                this.timeRangeInput = '1:00pm-11:00am';
                this.result = null;
                this.error = null;
            },

            clearAll() {
                this.timeRangeInput = '';
                this.result = null;
                this.error = null;
            },

            // Reformats the minute result as "Xh Ymin" for quick interpretation.
            humanReadable() {
                const hours = Math.floor(this.result / 60);
                const minutes = this.result % 60;
                if (hours === 0) return `${minutes} min`;
                if (minutes === 0) return `${hours} h`;
                return `${hours} h ${minutes} min`;
            },

            async calculate() {
                this.error = null;
                this.result = null;

                this.loading = true;
                try {
                    const response = await fetch('/api/algorithms/times/minutes-between', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ timeRange: this.timeRangeInput })
                    });

                    const data = await response.json();
                    if (!response.ok) {
                        this.error = data.error || `Request failed with HTTP ${response.status}`;
                    } else {
                        this.result = data.result;
                    }
                } catch (e) {
                    this.error = `Network error: ${e.message}`;
                } finally {
                    this.loading = false;
                }
            }
        };
    }
</script>
</body>
</html>
