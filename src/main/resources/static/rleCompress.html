<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Algorithms — RLE Compression</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.1/dist/cdn.min.js"></script>
    <style>
        body { background-color: #f8f9fa; }
        .result-code { font-size: 1.05rem; word-break: break-all; }
        [x-cloak] { display: none !important; }
    </style>
</head>
<body>
<div class="container py-5" style="max-width: 780px;" x-data="rleApp()">

    <nav class="mb-3">
        <a href="/" class="text-decoration-none">&larr; Back to algorithms</a>
    </nav>

    <header class="mb-4">
        <h1 class="mb-1">RLE Compression</h1>
        <p class="text-muted mb-0">
            <code>POST /api/algorithms/strings/rle-compress</code> — compresses repeated runs of letters using Run-Length Encoding.
        </p>
    </header>

    <div class="card shadow-sm mb-4">
        <div class="card-body">

            <div class="mb-3">
                <label for="text" class="form-label fw-semibold">Text</label>
                <input id="text" type="text" class="form-control font-monospace"
                       x-model="textInput"
                       placeholder="e.g. aaaAAbbbbBc">
                <div class="form-text">Letters only (ASCII <code>a-z</code>, <code>A-Z</code>), 1–1000 characters.</div>
            </div>

            <div class="form-check form-switch mb-3">
                <input id="caseSensitive" class="form-check-input" type="checkbox" role="switch"
                       x-model="caseSensitive">
                <label for="caseSensitive" class="form-check-label">
                    Case-sensitive
                    <span class="text-muted small">— when off, input is lowercased before compression</span>
                </label>
            </div>

            <div class="d-flex flex-wrap gap-2">
                <button class="btn btn-primary"
                        x-on:click="compress()"
                        x-bind:disabled="loading">
                    <span x-show="!loading">Compress</span>
                    <span x-show="loading" x-cloak style="display: none;">
                        <span class="spinner-border spinner-border-sm me-1" role="status" aria-hidden="true"></span>
                        Compressing…
                    </span>
                </button>
                <button class="btn btn-outline-secondary" x-on:click="loadExample()" type="button">
                    Load example
                </button>
                <button class="btn btn-outline-secondary" x-on:click="clearAll()" type="button">
                    Clear
                </button>
            </div>

        </div>
    </div>

    <template x-if="error">
        <div class="alert alert-danger" role="alert">
            <strong>Error:</strong> <span x-text="error"></span>
        </div>
    </template>

    <template x-if="result !== null">
        <div class="card shadow-sm border-success">
            <div class="card-header bg-success-subtle d-flex justify-content-between align-items-center">
                <span class="fw-semibold">Compressed</span>
                <span class="badge bg-success" x-text="compressionBadge()"></span>
            </div>
            <div class="card-body">
                <div class="result-code font-monospace mb-3" x-text="result"></div>
                <div class="text-muted small">
                    Original: <span x-text="originalLength"></span> chars &rarr;
                    Compressed: <span x-text="result.length"></span> chars
                    (<span x-text="savingsText()"></span>)
                </div>
            </div>
        </div>
    </template>

</div>

<script>
    function rleApp() {
        return {
            textInput: '',
            caseSensitive: true,        // matches server default (compact constructor in RleCompressRequest)
            result: null,
            originalLength: 0,
            error: null,
            loading: false,

            loadExample() {
                // Mix of upper/lower so the case-sensitive toggle is visibly meaningful.
                // case-sensitive: "aaaAAbbbbBc" -> "3a2A4b1B1c"
                // case-insensitive: same input -> "5a5b1c"
                this.textInput = 'aaaAAbbbbBc';
                this.result = null;
                this.error = null;
            },

            clearAll() {
                this.textInput = '';
                this.result = null;
                this.error = null;
            },

            // "-40%" when compressed is smaller, "+25%" when compressed is bigger than original.
            savingsText() {
                if (this.originalLength === 0) return '';
                const diff = this.result.length - this.originalLength;
                const pct = Math.round((diff / this.originalLength) * 100);
                return pct >= 0 ? `+${pct}% size` : `${pct}% size`;
            },

            compressionBadge() {
                if (this.result.length < this.originalLength) return 'smaller';
                if (this.result.length > this.originalLength) return 'larger';
                return 'same size';
            },

            async compress() {
                this.error = null;
                this.result = null;
                this.originalLength = this.textInput.length;

                this.loading = true;
                try {
                    const response = await fetch('/api/algorithms/strings/rle-compress', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            text: this.textInput,
                            caseSensitive: this.caseSensitive
                        })
                    });

                    const data = await response.json();
                    if (!response.ok) {
                        this.error = data.error || `Request failed with HTTP ${response.status}`;
                    } else {
                        this.result = data.result;
                    }
                } catch (e) {
                    this.error = `Network error: ${e.message}`;
                } finally {
                    this.loading = false;
                }
            }
        };
    }
</script>
</body>
</html>
