<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Algorithms — Most Repeated Letters</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.1/dist/cdn.min.js"></script>
    <style>
        body { background-color: #f8f9fa; }
        .result-word { font-size: 2rem; font-weight: 600; word-break: break-all; }
        .repeated-letter { color: #198754; text-decoration: underline; text-decoration-thickness: 2px; }
        [x-cloak] { display: none !important; }
    </style>
</head>
<body>
<div class="container py-5" style="max-width: 780px;" x-data="mostRepeatedLettersApp()">

    <nav class="mb-3">
        <a href="/" class="text-decoration-none">&larr; Back to algorithms</a>
    </nav>

    <header class="mb-4">
        <h1 class="mb-1">Most Repeated Letters</h1>
        <p class="text-muted mb-0">
            <code>POST /api/algorithms/strings/most-repeated-letters</code> —
            finds the first word whose letters repeat the most.
        </p>
    </header>

    <div class="card shadow-sm mb-4">
        <div class="card-body">

            <div class="mb-3">
                <label for="text" class="form-label fw-semibold">Text</label>
                <textarea id="text" rows="3" class="form-control"
                          x-model="textInput"
                          placeholder="e.g. Today, is the greatest day ever!"></textarea>
                <div class="form-text">
                    Any Unicode text, 1–10 000 characters. Must contain at least one letter.
                    Words are separated by any non-letter characters.
                </div>
            </div>

            <div class="d-flex flex-wrap gap-2">
                <button class="btn btn-primary"
                        x-on:click="findWord()"
                        x-bind:disabled="loading">
                    <span x-show="!loading">Find</span>
                    <span x-show="loading" x-cloak style="display: none;">
                        <span class="spinner-border spinner-border-sm me-1" role="status" aria-hidden="true"></span>
                        Finding…
                    </span>
                </button>
                <button class="btn btn-outline-secondary" x-on:click="loadExample()" type="button">
                    Load example
                </button>
                <button class="btn btn-outline-secondary" x-on:click="clearAll()" type="button">
                    Clear
                </button>
            </div>

        </div>
    </div>

    <template x-if="error">
        <div class="alert alert-danger" role="alert">
            <strong>Error:</strong> <span x-text="error"></span>
        </div>
    </template>

    <template x-if="result !== null">
        <div class="card shadow-sm border-success">
            <div class="card-header bg-success-subtle">
                <span class="fw-semibold">Winning word</span>
            </div>
            <div class="card-body">
                <div class="result-word text-success" x-html="highlightedResult()"></div>
                <div class="text-muted small mt-2" x-text="repeatedSummary()"></div>
            </div>
        </div>
    </template>

</div>

<script>
    function mostRepeatedLettersApp() {
        return {
            textInput: '',
            result: null,
            error: null,
            loading: false,

            loadExample() {
                // Task example: "greatest" has 2×e + 2×t and appears before "ever" (which also has 2×e).
                this.textInput = 'Today, is the greatest day ever!';
                this.result = null;
                this.error = null;
            },

            clearAll() {
                this.textInput = '';
                this.result = null;
                this.error = null;
            },

            // Counts each letter in the returned word (case-insensitive) and
            // returns the set of letters whose count is > 1.
            // Kept in sync with the server-side comparison rule, which also
            // lower-cases before counting (Locale.ROOT).
            repeatedLetterSet() {
                if (!this.result) return new Set();
                const counts = new Map();
                for (const ch of this.result.toLowerCase()) {
                    counts.set(ch, (counts.get(ch) || 0) + 1);
                }
                return new Set(
                    [...counts.entries()]
                        .filter(([, n]) => n > 1)
                        .map(([ch]) => ch)
                );
            },

            // Re-renders the winning word with repeating letters marked up.
            // Iterates via for..of so Unicode code points (incl. Polish ż, ł, ś)
            // are handled correctly.
            highlightedResult() {
                if (!this.result) return '';
                const repeated = this.repeatedLetterSet();
                let html = '';
                for (const ch of this.result) {
                    const safe = this.escapeHtml(ch);
                    if (repeated.has(ch.toLowerCase())) {
                        html += `<span class="repeated-letter">${safe}</span>`;
                    } else {
                        html += safe;
                    }
                }
                return html;
            },

            // Human-friendly summary like "Repeated: 2× e, 2× t".
            repeatedSummary() {
                if (!this.result) return '';
                const counts = new Map();
                for (const ch of this.result.toLowerCase()) {
                    counts.set(ch, (counts.get(ch) || 0) + 1);
                }
                const repeated = [...counts.entries()]
                    .filter(([, n]) => n > 1)
                    .sort((a, b) => b[1] - a[1] || a[0].localeCompare(b[0]));
                if (repeated.length === 0) return 'No repeated letters.';
                return 'Repeated: ' + repeated.map(([ch, n]) => `${n}× ${ch}`).join(', ');
            },

            escapeHtml(s) {
                return s.replace(/[&<>"']/g, c => ({
                    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
                }[c]));
            },

            async findWord() {
                this.error = null;
                this.result = null;

                this.loading = true;
                try {
                    const response = await fetch('/api/algorithms/strings/most-repeated-letters', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ text: this.textInput })
                    });

                    const data = await response.json();
                    if (!response.ok) {
                        this.error = data.error || `Request failed with HTTP ${response.status}`;
                    } else {
                        this.result = data.result;
                    }
                } catch (e) {
                    this.error = `Network error: ${e.message}`;
                } finally {
                    this.loading = false;
                }
            }
        };
    }
</script>
</body>
</html>
